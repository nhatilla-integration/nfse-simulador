services:
  api:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
    depends_on:
      - postgres
      - mongo

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
      POSTGRES_DB: ${PG_DATABASE:-nfse_simulador}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Mongo local, alternativa ao MongoDB Atlas. Para usa-lo, defina no .env:
  # MONGO_URI=mongodb://mongo:27017/nfse_simulador
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

volumes:
  pgdata:
  mongodata:
